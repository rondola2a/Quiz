<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>기말고사 플래시카드</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --ink: #101828;
      --muted: #64748b;
      --line: #d9dee8;
      --accent: #116d6e;
      --accent-soft: #e3f4f3;
      --wrong: #b42318;
      --wrong-soft: #fee4e2;
      --right: #067647;
      --right-soft: #dcfae6;
      --mark: #8a6116;
      --mark-soft: #fff2cc;
      --shadow: 0 18px 44px rgba(15, 23, 42, .12);
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; min-height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.55;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }

    button, textarea, input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    header {
      padding: 14px 16px 10px;
      background: rgba(246, 247, 249, .94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.25;
      font-weight: 800;
    }

    .counter {
      color: var(--muted);
      font-size: .88rem;
      white-space: nowrap;
    }

    .progress {
      height: 7px;
      border-radius: 999px;
      background: #e6eaf0;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--accent);
      transition: width .18s ease;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }

    .chip {
      min-height: 38px;
      border-radius: 8px;
      background: #e9edf3;
      color: #334155;
      font-size: .86rem;
      font-weight: 700;
    }

    .chip.active {
      background: var(--ink);
      color: white;
    }

    main {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 14px 14px 116px;
    }

    .card {
      min-height: calc(100dvh - 242px);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: .83rem;
      font-weight: 700;
    }

    .badge {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mark {
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: #eef2f7;
      color: #64748b;
      font-size: 1.25rem;
      line-height: 1;
    }

    .mark.on {
      color: var(--mark);
      background: var(--mark-soft);
    }

    .content {
      padding: 16px;
      overflow: auto;
      flex: 1;
    }

    .prompt {
      margin: 0 0 16px;
      font-size: 1rem;
      line-height: 1.68;
      font-weight: 760;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .choices {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .choice {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 8px;
      align-items: start;
      width: 100%;
      min-height: 46px;
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      text-align: left;
      color: var(--ink);
    }

    .choice .num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #eef2f7;
      font-weight: 800;
      line-height: 1;
    }

    .choice.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .choice.correct {
      border-color: #83d7a8;
      background: var(--right-soft);
    }

    .choice.wrong {
      border-color: #fda29b;
      background: var(--wrong-soft);
    }

    .answer {
      display: none;
      margin-top: 16px;
      padding: 13px;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid var(--line);
    }

    .answer.show {
      display: block;
    }

    .answer strong {
      display: block;
      margin-bottom: 6px;
      color: var(--accent);
    }

    .note {
      margin-top: 12px;
    }

    .note label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: .86rem;
      font-weight: 800;
    }

    textarea {
      width: 100%;
      min-height: 88px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: white;
      color: var(--ink);
      line-height: 1.5;
    }

    .status-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 12px 14px 14px;
      border-top: 1px solid var(--line);
      background: #fbfcfe;
    }

    .status {
      min-height: 42px;
      border-radius: 8px;
      font-weight: 800;
      color: #334155;
      background: #eef2f7;
    }

    .status.right.on {
      color: var(--right);
      background: var(--right-soft);
    }

    .status.wrong.on {
      color: var(--wrong);
      background: var(--wrong-soft);
    }

    .status.again.on {
      color: var(--mark);
      background: var(--mark-soft);
    }

    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      background: rgba(246, 247, 249, .95);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--line);
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    }

    .nav {
      width: min(720px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      gap: 8px;
    }

    .nav button {
      min-height: 50px;
      border-radius: 8px;
      background: var(--ink);
      color: white;
      font-weight: 850;
    }

    .nav .ghost {
      background: #e9edf3;
      color: #334155;
      font-size: 1.2rem;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: calc(100dvh - 240px);
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    @media (min-width: 640px) {
      header { padding-left: 24px; padding-right: 24px; }
      main { padding-top: 20px; }
      .prompt { font-size: 1.08rem; }
      .card { min-height: 610px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topline">
        <h1>기말고사 플래시카드</h1>
        <div class="counter" id="counter"></div>
      </div>
      <div class="progress" aria-hidden="true"><span id="progress"></span></div>
      <div class="filters" id="filters">
        <button class="chip active" data-filter="all">전체</button>
        <button class="chip" data-filter="bookmarked">북마크</button>
        <button class="chip" data-filter="wrong">오답</button>
        <button class="chip" data-filter="again">헷갈림</button>
      </div>
    </header>

    <main id="main"></main>

    <footer>
      <div class="nav">
        <button class="ghost" id="prev" aria-label="이전 문제">‹</button>
        <button id="reveal">정답 보기</button>
        <button class="ghost" id="next" aria-label="다음 문제">›</button>
      </div>
    </footer>
  </div>

  <script>

"text":"설립 근거법은 사회복지공동모금회법이다."},{"label":"②","text":"조직은 시·도별 지회 형식에서 독립법인 형식으로 변경되었다."},{"label":"③","text":"모금방식은 기간을 기준으로 크게 연말집중모금과 연중모금으로 분류한다."},{"label":"④","text":"배분사업은 신청사업, 기획사업, 긴급지원사업, 지정기탁사업 등이 있다."},{"label":"⑤","text":"전체 모금액 중 법인모금액이 차지하는 비중이 개인모금액보다 크다."}],"answer":"②","answerText":"조직은 시·도별 지회 형식에서 독립법인 형식으로 변경되었다.","chapter":"제9장 지역사회복지 추진기관"},{"id":"m20","kind":"객관식","number":20,"prompt":"자원봉사관리자의 업무 역할에 대한 설명으로 옳지 않은 것은?","choices":[{"label":"①","text":"자원봉사자들의 지도자와 봉사활동 지침의 결정자"},{"label":"②","text":"자원봉사 프로그램의 관리자와 인사관리자"},{"label":"③","text":"조직과 조직에서 활동하는 자원봉사자들 사이의 주요 의사전달자"},{"label":"④","text":"자원봉사 프로그램의 지지를 위한 기금 조성자 및 투자자"},{"label":"⑤","text":"조직에서 활동하는 자원봉사자들의 옹호자"}],"answer":"④","answerText":"자원봉사 프로그램의 지지를 위한 기금 조성자 및 투자자","chapter":"제9장 지역사회복지 추진기관"},{"id":"m21","kind":"객관식","number":21,"prompt":"사회복지관 사업 내용 중 서비스 제공기능에 해당하지 않는 것은?","choices":[{"label":"①","text":"지역사회 보호"},{"label":"②","text":"사례관리"},{"label":"③","text":"교육문화"},{"label":"④","text":"자활지원"},{"label":"⑤","text":"가족기능 강화"}],"answer":"②","answerText":"사례관리","chapter":"제9장 지역사회복지 추진기관"},{"id":"m22","kind":"객관식","number":22,"prompt":"지역사회보장협의체에 관한 설명으로 옳은 것을 모두 고른 것은? ㄱ. 사회보장급여의 이용·제공 및 수급권자 발굴에 관한 법률(사회보장급여법)에 근거한다. ㄴ. 시·군·구 단위뿐만 아니라 읍·면·동 단위에도 주민 네트워크 중심의 협의체를 둔다. ㄷ. 지역사회보장계획의 수립·시행·평가에 관한 사항을 심의·자문한다. ㄹ. 전액 민간 재원으로만 운영되는 순수 민간 자율 협의 기구이다.","choices":[{"label":"①","text":"ㄱ, ㄴ, ㄷ"},{"label":"②","text":"ㄱ, ㄷ, ㄹ"},{"label":"③","text":"ㄴ, ㄷ, ㄹ"},{"label":"④","text":"ㄱ, ㄴ, ㄹ"},{"label":"⑤","text":"ㄱ, ㄴ, ㄷ, ㄹ"}],"answer":"①","answerText":"ㄱ, ㄴ, ㄷ","chapter":"제9장 지역사회복지 추진기관"},{"id":"m23","kind":"객관식","number":23,"prompt":"사회복지협의회(이하 협의회)와 사회복지관(이하 복지관)에 대한 비교 설명으로 옳은 것은?","choices":[{"label":"①","text":"협의회는 지역 주민에게 직접 복지서비스를 제공하는 실천 기관이다."},{"label":"②","text":"복지관은 지역 내 사회복지법인 및 시설들의 업무를 조정하고 협의하는 연합체 성격의 기관 이다."},{"label":"③","text":"협의회는 사회복지사업법에 근거한 법정 단체이며, 민·관 협의 및 조정을 주요 기능으로 한다."},{"label":"④","text":"복지관은 행정안전부의 자원봉사활동 기본법에 의거하여 설립된다."},{"label":"⑤","text":"협의회와 복지관은 모두 영리를 목적으로 운영할 수 있는 법인격체이다."}],"answer":"③","answerText":"협의회는 사회복지사업법에 근거한 법정 단체이며, 민·관 협의 및 조정을 주요 기능으로 한다.","chapter":"제9장 지역사회복지 추진기관"},{"id":"m24","kind":"객관식","number":24,"prompt":"자원봉사센터의 주요 기능 및 역할에 관한 설명으로 옳지 않은 것은?","choices":[{"label":"①","text":"지역 내 자원봉사자의 모집, 교육, 배치 및 사후 관리를 총괄한다."},{"label":"②","text":"자원봉사 수요 기관과 자원봉사 희망자를 효율적으로 연결하는 허브 역할을 한다."},{"label":"③","text":"자원봉사 활동 실적을 인증하고 1365 자원봉사 포털 시스템을 관리한다."},{"label":"④","text":"저소득 소외계층에게 직접적인 현금 급여나 제도적 구제 조치를 집행하는 행정기구이다."},{"label":"⑤","text":"지역 내 유관 기관들과 협력하여 자원봉사 활성화를 위한 프로그램을 개발한다."}],"answer":"④","answerText":"저소득 소외계층에게 직접적인 현금 급여나 제도적 구제 조치를 집행하는 행정기구이다.","chapter":"제9장 지역사회복지 추진기관"},{"id":"m25","kind":"객관식","number":25,"prompt":"우리나라 사회복지공동모금회의 '배분사업' 유형 중 다음 보기의 설명에 해당하는 것은? 공동모금회가 지역사회의 복지 향상을 위해 특정한 주제나 대상을 지정하여 공모 형태로 사회복지 기관·시설의 신청을 받아 심사 후 지원하는 사업","choices":[{"label":"①","text":"신청사업"},{"label":"②","text":"기획사업"},{"label":"③","text":"긴급지원사업"},{"label":"④","text":"지정기탁사업"},{"label":"⑤","text":"연중모금사업"}],"answer":"①","answerText":"신청사업","chapter":"제9장 지역사회복지 추진기관"},{"id":"m26","kind":"객관식","number":26,"prompt":"사회적기업에 대한 설명으로 옳은 것을 모두 고르시오. 가. 취약계층에게 사회서비스와 일자리를 제공한다. 나. 우리나라 사회적기업은 사업별 정부부처장관의 인가를 받아야 한다. 다. 일자리제공형 사회적기업은 취약계층 고용비율이 30% 이상이어야 한다. 라. 사회적기업은 이윤을 추구하는 기업의 가치를 우선한다.","choices":[{"label":"①","text":"가, 나, 다"},{"label":"②","text":"가, 다"},{"label":"③","text":"나, 라"},{"label":"④","text":"라"},{"label":"⑤","text":"가, 나, 다, 라"}],"answer":"②","answerText":"가, 다","chapter":"제10장 사회적 경제"},{"id":"m27","kind":"객관식","number":27,"prompt":"사회적협동조합에 대한 설명으로 옳지 않은 것을 모두 고르시오. 가. 영리를 목적으로 하지 않는 비영리법인이다. 나. 고용노동부의 인증을 받아야 한다. 다. 전체 사업 가운데 공익사업을 40% 이상 수행해야 한다. 라. 조합의 사업 이용 실적에 따라 배당을 받을 수 있다.","choices":[{"label":"①","text":"가, 나, 다"},{"label":"②","text":"가, 다"},{"label":"③","text":"나, 라"},{"label":"④","text":"라"},{"label":"⑤","text":"가, 나, 다, 라"}],"answer":"③","answerText":"나, 라","chapter":"제10장 사회적 경제"},{"id":"m28","kind":"객관식","number":28,"prompt":"다음 중 자활기업에 관한 설명으로 옳지 않은 것은?","choices":[{"label":"①","text":"2인 이상의 수급자 또는 저소득층의 상호협력을 바탕으로 한다."},{"label":"②","text":"2012년 국민기초생활보장법의 개정으로 자활공동체가 자활기업으로 명칭이 변경되었다."},{"label":"③","text":"근로능력이 없는 수급자가 주 참여대상이다."},{"label":"④","text":"자활근로사업단이 자활기업으로 전환될 경우, 사업의 동일성을 유지하여야 지원받을 수 있다."},{"label":"⑤","text":"국가나 지방자치단체는 조달구매 시 자활기업 생산품을 우선 구매할 수 있다."}],"answer":"③","answerText":"근로능력이 없는 수급자가 주 참여대상이다.","chapter":"제10장 사회적 경제"},{"id":"m29","kind":"객관식","number":29,"prompt":"마을기업에 대한 설명으로 옳은 것을 모두 고르시오. 가. 2010년 마을기업 육성계획을 수립하여, 2011년부터 본격적으로 추진되었다. 나. 마을단위의 기업이다. 다. 지역공동체 이익을 효과적으로 실현하기 위해 설립·운영되는 기업이다. 라. 마을기업의 유형은 예비마을기업, 육성형 마을기업, 기업형 마을기업 등으로 구분할 수 있다.","choices":[{"label":"①","text":"가, 나, 다"},{"label":"②","text":"가, 다"},{"label":"③","text":"가, 나, 다, 라"},{"label":"④","text":"나, 다, 라"},{"label":"⑤","text":"가, 다, 라"}],"answer":"①","answerText":"가, 나, 다","chapter":"제10장 사회적 경제"},{"id":"m30","kind":"객관식","number":30,"prompt":"사회적 경제조직의 한 유형인 '사회적기업'의 인증 요건에 대한 설명으로 옳지 않은 것은?","choices":[{"label":"①","text":"민법상 법인·상법상 회사, 협동조합, 비영리민간단체 등 조직 형태를 갖추어야 한다."},{"label":"②","text":"유료 유관 서비스를 제공하는 경우, 영업활동을 통한 수입이 대통령령으로 정하는 기준 이상 이어야 한다."},{"label":"③","text":"홍보 및 마케팅 효과를 극대화하기 위해 이윤 추구와 주주 이익 극대화를 최우선 목적으로 명시해야 한다."},{"label":"④","text":"서비스 제공형의 경우 사회서비스를 제공받는 취약계층의 비율이 30% 이상이어야 한다."},{"label":"⑤","text":"상법상 회사의 경우 회계연도별로 발생한 배분 가능한 이윤의 3분의 2 이상을 사회적 목적을 위해 재투자해야 한다."}],"answer":"③","answerText":"홍보 및 마케팅 효과를 극대화하기 위해 이윤 추구와 주주 이익 극대화를 최우선 목적으로 명시해야 한다.","chapter":"제10장 사회적 경제"},{"id":"m31","kind":"객관식","number":31,"prompt":"일반협동조합과 '사회적협동조합'의 차이점을 설명한 내용으로 옳은 것은?","choices":[{"label":"①","text":"일반협동조합은 영리법인이고, 사회적협동조합은 비영리법인이다."},{"label":"②","text":"일반협동조합은 주무부처의 인가를 받아야 하고, 사회적협동조합은 시·도지사에게 신고한다."},{"label":"③","text":"일반협동조합은 청산 시 잔여재산을 국고 등에 기부해야 하지만, 사회적협동조합은 조합원끼 리 배당할 수가 있다."},{"label":"④","text":"일반협동조합은 이윤의 100%를 사회에 환원해야 하는 강제 조항이 있다."},{"label":"⑤","text":"사회적협동조합은 조합원의 권익만을 위해 사업을 수행하며 공익적 목적의 사업은 수행할 수 없다."}],"answer":"①","answerText":"일반협동조합은 영리법인이고, 사회적협동조합은 비영리법인이다.","chapter  민간의 참여가 약화된다.","chapter":"제13장 지역사회복지 동향과 발전과제"},{"id":"m57","kind":"객관식","number":57,"prompt":"지역사회복지 발전을 위한 지방분권화의 부정적인 측면을 모두 고른 것은? ㄱ. 지방자치단체 간 재정능력의 차이로 복지수준이 다를 수 있다. ㄴ. 지방자치단체 간의 경쟁이 심화되어 지역 이기주의가 나타날 수 있다. ㄷ. 지방자치단체장의 의지에 따라 복지서비스의 지역 간 불균형이 나타날 수 있다. ㄹ. 지방자치단체의 권한과 책임감을 강화시킬 수 있다.","choices":[{"label":"①","text":"ㄱ, ㄷ"},{"label":"②","text":"ㄴ, ㄹ"},{"label":"③","text":"ㄱ, ㄴ, ㄷ"},{"label":"④","text":"ㄱ, ㄴ, ㄷ, ㄹ"}],"answer":"③","answerText":"ㄱ, ㄴ, ㄷ","chapter":"제13장 지역사회복지 동향과 발전과제"},{"id":"m58","kind":"객관식","number":58,"prompt":"지역사회복지의 변화와 관련하여 사회복지체계의 변화를 설명하는 내용으로 옳은 것을 모두 고른 것은? ㄱ. 대상자가 거주하는 지역사회를 기반으로 한 재가복지에로 그 중심이 변하였다. ㄴ. 지역사회자원의 범위와 서비스의 공급주체가 다원화 다양화되고 있다. ㄷ. 지역사회에 존재하는 사회자원의 내용이나 특성 등과 이와 관련된 가치관들이 중요시되고 있다. ㄹ. 사회복지 원조방법의 관심이 대상자의 심리적인 측면의 원조를 지향하고 있다.","choices":[{"label":"①","text":"ㄴ, ㄷ"},{"label":"②","text":"ㄱ, ㄷ"},{"label":"③","text":"ㄱ, ㄴ"},{"label":"④","text":"ㄱ, ㄴ, ㄷ"},{"label":"⑤","text":"ㄱ, ㄴ, ㄷ, ㄹ"}],"answer":"④","answerText":"ㄱ, ㄴ, ㄷ","chapter":"제13장 지역사회복지 동향과 발전과제"},{"id":"m59","kind":"객관식","number":59,"prompt":"우리나라 지역사회복지의 발전과제 중 옳지 않은 것은?","choices":[{"label":"①","text":"정상화 이념에 입각한 비영리조직의 활동의 확대와 지원"},{"label":"②","text":"지역이기주의의 극복을 통한 성숙된 시민의식의 고양"},{"label":"③","text":"지역사회복지 공동체의 해체"},{"label":"④","text":"빈곤문제에 효율적으로 대처하는 사회안전망의 구축"},{"label":"⑤","text":"재가복지와 지역사회복지로의 강화"}],"answer":"③","answerText":"지역사회복지 공동체의 해체","chapter":"제13장 지역사회복지 동향과 발전과제"},{"id":"m60","kind":"객관식","number":60,"prompt":"최근 한국 지역사회복지의 핵심 동향인 '지역사회 통합돌봄'에 관한 설명으로 옳지 않은 것 은?","choices":[{"label":"①","text":"돌봄이 필요한 주민(노인, 장애인 등)이 살던 곳(가정, 지역사회)에서 노후를 보내거나 자립할 수 있도록 지원하는 체계이다."},{"label":"②","text":"주거, 보건의료, 요양, 돌봄, 독립생활 지원 등이 통합적으로 연계되어 제공된다."},{"label":"③","text":"대규모 거주 시설 및 요양병원 중심의 시설 보호기능을 무한히 확대·강화하는 정책이다."},{"label":"④","text":"융합적 서비스를 위해 공공과 민간의 다학제적 실무자 간 협업이 매우 중요하다."},{"label":"⑤","text":"지역사회 중심의 돌봄 기반을 구축하여 삶의 질을 높이고 복지 재정의 효율성을 기하고자 한 다."}],"answer":"③","answerText":"대규모 거주 시설 및 요양병원 중심의 시설 보호기능을 무한히 확대·강화하는 정책이다.","chapter":"제13장 지역사회복       if (index < 0) return list.length - 1;
      if (index >= list.length) return 0;
      return index;
    }

    function render() {
      const list = visibleCards();
      index = clampIndex(list);
      selected = "";
      const reviewed = CARDS.filter((card) => cardState(card).result).length;
      counter.textContent = `${reviewed}/${CARDS.length} 저장`;
      progress.style.width = `${Math.round((reviewed / CARDS.length) * 100)}%`;

      if (!list.length) {
        main.innerHTML = `<section class="empty">이 조건에 맞는 카드가 없습니다.</section>`;
        revealButton.textContent = "전체 보기";
        return;
      }

      const card = list[index];
      const saved = cardState(card);
      revealButton.textContent = revealed ? "정답 숨기기" : "정답 보기";

      main.innerHTML = `
        <section class="card">
          <div class="meta">
            <span class="badge">${escapeHtml(card.chapter)} · ${escapeHtml(card.kind)} ${card.number}번</span>
            <button class="mark ${saved.bookmarked ? "on" : ""}" id="bookmark" aria-label="북마크" title="북마크">★</button>
          </div>
          <div class="content">
            <p class="prompt">${escapeHtml(card.prompt)}</p>
            ${renderChoices(card, saved)}
            <div class="answer ${revealed ? "show" : ""}">
              <strong>정답 ${escapeHtml(card.answer)}</strong>
              <div>${escapeHtml(card.answerText || card.answer)}</div>
              <div class="note">
                <label for="note">내 풀이 메모</label>
                <textarea id="note" placeholder="헷갈린 이유나 암기 포인트를 적어두세요.">${escapeHtml(saved.note || "")}</textarea>
              </div>
            </div>
          </div>
          <div class="status-row">
            <button class="status right ${saved.result === "right" ? "on" : ""}" data-result="right">맞힘</button>
            <button class="status wrong ${saved.result === "wrong" ? "on" : ""}" data-result="wrong">틀림</button>
            <button class="status again ${saved.result === "again" ? "on" : ""}" data-result="again">헷갈림</button>
          </div>
        </section>
      `;

      document.querySelector("#bookmark").addEventListener("click", () => {
        saved.bookmarked = !saved.bookmarked;
        saveState();
        renderPreserveReveal();
      });

      document.querySelectorAll(".choice").forEach((button) => {
        button.addEventListener("click", () => {
          selected = button.dataset.choice;
          revealed = true;
          if (selected) saved.result = selected === card.answer ? "right" : "wrong";
          saveState();
          renderPreserveReveal();
        });
      });

      document.querySelectorAll("[data-result]").forEach((button) => {
        button.addEventListener("click", () => {
          saved.result = saved.result === button.dataset.result ? "" : button.dataset.result;
          saveState();
          renderPreserveReveal();
        });
      });

      const note = document.querySelector("#note");
      if (note) {
        note.addEventListener("input", () => {
          saved.note = note.value;
          saveState();
        });
      }

      saveState();
    }

    function renderChoices(card, saved) {
      if (!card.choices.length) return "";
      return `<ul class="choices">${card.choices.map((choice) => {
        let cls = "choice";
        if (selected === choice.label) cls += " selected";
        if (revealed && choice.label === card.answer) cls += " correct";
        if (revealed && selected === choice.label && selected !== card.answer) cls += " wrong";
        return `<li><button class="${cls}" data-choice="${escapeHtml(choice.label)}"><span class="num">${escapeHtml(choice.label)}</span><span>${escapeHtml(choice.text)}</span></button></li>`;
      }).join("")}</ul>`;
    }

    function renderPreserveReveal() {
      const keepReveal = revealed;
      render();
      revealed = keepReveal;
      const answer = document.querySelector(".answer");
      if (answer && revealed) answer.classList.add("show");
      revealButton.textContent = revealed ? "정답 숨기기" : "정답 보기";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.querySelector("#prev").addEventListener("click", () => {
      index -= 1;
      revealed = false;
      render();
    });

    document.querySelector("#next").addEventListener("click", () => {
      index += 1;
      revealed = false;
      render();
    });

    revealButton.addEventListener("click", () => {
      if (!visibleCards().length) {
        filter = "all";
        index = 0;
        revealed = false;
        document.querySelectorAll(".chip").forEach((chip) => chip.classList.toggle("active", chip.dataset.filter === "all"));
        render();
        return;
      }
      revealed = !revealed;
      renderPreserveReveal();
    });

    filters.addEventListener("click", (event) => {
      const button = event.target.closest("[data-filter]");
      if (!button) return;
      filter = button.dataset.filter;
      index = 0;
      revealed = false;
      document.querySelectorAll(".chip").forEach((chip) => chip.classList.toggle("active", chip === button));
      render();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") document.querySelector("#prev").click();
      if (event.key === "ArrowRight") document.querySelector("#next").click();
      if (event.key === " ") {
        event.preventDefault();
        revealButton.click();
      }
    });

    render();
  </script>
</body>
</html>
